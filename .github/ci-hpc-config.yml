matrix:
    - openmpi
    - hpcx_openmpi
    - intel_mpi
    - mpi_off


intel_mpi:
    build:
      modules:
        - ninja
        - intel-mpi
      modules_package:
        - eckit:intel-mpi
        - atlas:intel-mpi
      dependency_cmake_options:
        - "ecmwf/mir: '-DENABLE_BUILD_TOOLS=ON'"
        - "ecmwf/fdb: '-DENABLE_LUSTRE=OFF'"
      dependencies:
        - ecmwf/ecbuild@master
        - ecmwf/eccodes@master
        - ecmwf/eckit@master
        - ecmwf/metkit@master
        - ecmwf/fckit@master
        - ecmwf/fdb@master
        - ecmwf/atlas@master
        - ecmwf/atlas-orca@master
        - ecmwf/mir@master
      parallel: 64
      ntasks: 16
      env:
        - CTEST_PARALLEL_LEVEL=1
        - OMPI_MCA_rmaps_base_oversubscribe=1
        - ECCODES_SAMPLES_PATH=$ECCODES_DIR/share/eccodes/samples
        - ECCODES_DEFINITION_PATH=$ECCODES_DIR/share/eccodes/definitions

